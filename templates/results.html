<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4;
        }

        .price-text {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col pt-10 px-4 pb-20 bg-gradient-to-br from-gray-50 to-gray-200">

    <div class="max-w-md mx-auto w-full">
        <!-- Success Icon -->
        <div class="flex justify-center mb-6 relative">
            <div class="w-20 h-20 bg-green-100 rounded-full absolute -top-10 opacity-50 blur-xl animate-pulse"></div>
            <div
                class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg border-2 border-green-500 z-10 relative">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <!-- Receipt Card -->
        <div class="bg-white p-8 rounded-3xl shadow-xl relative overflow-hidden border border-gray-100">
            <!-- Decorative dashed line -->
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-400 to-emerald-600"></div>

            <div class="text-center mb-6">
                <h2 class="text-sm uppercase tracking-widest text-gray-400 font-semibold mb-1">Valuation Complete</h2>
                <h1 class="text-2xl font-bold text-gray-800">Diamond Estimate</h1>
            </div>

            <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100 mb-8 text-center">
                <p class="text-sm text-gray-500 mb-2 font-medium">Estimated Market Value</p>
                <div class="flex items-center justify-center space-x-1">
                    <span class="text-3xl text-gray-400 font-bold">$</span>
                    <span
                        class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-600 to-emerald-800 price-text tracking-tight">
                        {{ final_result }}
                    </span>
                </div>
                <div class="mt-4 pt-4 border-t border-gray-200 border-dashed">
                    <p class="text-xs text-gray-400">Model Confidence: High</p>
                </div>
            </div>

            <div class="flex flex-col space-y-3">
                <a href="/predict"
                    class="w-full text-center bg-gray-900 hover:bg-gray-800 text-white font-medium py-3.5 px-6 rounded-xl transition-colors shadow-md">
                    Evaluate Another Diamond
                </a>
                <a href="/"
                    class="w-full text-center bg-white hover:bg-gray-50 text-gray-600 font-medium py-3.5 px-6 rounded-xl border border-gray-200 transition-colors">
                    Return to Home
                </a>
            </div>
        </div>

    </div>

</body>

</html>
